<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Restaurant Menu</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

/* HEADER */
.header{
background:black;
color:white;
padding:20px;
}

.header img{
width:80px;
display:block;
margin:auto;
}

.header h1{
margin:10px 0 5px;
font-size:22px;
}

.header p{
font-weight:bold;
}

/* SECTION TITLE */
.section-title{
margin-top:30px;
font-size:20px;
}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,260px));
justify-content:center;
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* IMAGE FIX (FINAL) */
.card img{
width:100%;
height:120px;
object-fit:contain;
display:block;
margin:auto;
padding:10px;

/* REMOVE WHITE BOX EFFECT */
background:transparent;
mix-blend-mode:multiply;
}

/* CONTENT */
.card-content{
padding:10px;
}

.card h3{
margin:10px 0 5px;
}

.price{
font-weight:bold;
margin-bottom:10px;
}

/* BUTTON */
button{
background:#ff5722;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e64a19;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

model-viewer{
width:100%;
height:300px;
}

.close{
margin-top:10px;
background:black;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="./cafe.png">
<h1>Italiano Cafe</h1>
<p><b>AR Smart Menu</b></p>
</div>

<p><b>Tap any item → View it in AR → Place it on your table</b></p>

<!-- BURGER -->
<h2 class="section-title">Burgers</h2>
<div class="menu">
<div class="card">
<img src="./burger.png">
<div class="card-content">
<h3>Deluxe Burger</h3>
<p class="price">850 PKR</p>
<button onclick="openAR('burger.glb')">View in AR</button>
</div>
</div>
</div>

<!-- PIZZA -->
<h2 class="section-title">Pizza</h2>
<div class="menu">
<div class="card">
<img src="./pizza.png">
<div class="card-content">
<h3>Italian Pizza</h3>
<p class="price">1200 PKR</p>
<button onclick="openAR('pizza.glb')">View in AR</button>
</div>
</div>
</div>

<!-- DRINK -->
<h2 class="section-title">Drinks</h2>
<div class="menu">
<div class="card">
<img src="./coffee.png">
<div class="card-content">
<h3>Cappuccino Coffee</h3>
<p class="price">500 PKR</p>
<button onclick="openAR('coffee.glb')">View in AR</button>
</div>
</div>
</div>

<!-- DESSERT -->
<h2 class="section-title">Desserts</h2>
<div class="menu">
<div class="card">
<img src="./dessert.png">
<div class="card-content">
<h3>Chocolate Dessert</h3>
<p class="price">650 PKR</p>
<button onclick="openAR('cake.glb')">View in AR</button>
</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<model-viewer id="viewer"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
shadow-intensity="1">
</model-viewer>

<button class="close" onclick="closeAR()">Close</button>

</div>
</div>

<script>

function openAR(model){
document.getElementById("viewer").src = model;
document.getElementById("modal").style.display = "flex";
}

function closeAR(){
document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
