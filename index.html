<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Restaurant Menu</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js">
</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

header{
background:#111;
color:white;
text-align:center;
padding:25px;
}

header img{
height:80px;
}

header p{
font-weight:bold;
font-size:20px;
margin:5px;
}

/* INSTRUCTION */

.intro{
text-align:center;
padding:15px;
font-size:17px;
font-weight:bold;
background:#eee;
}

/* CATEGORY */

.category{
text-align:center;
margin-top:30px;
font-size:22px;
font-weight:bold;
}

/* MENU GRID */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,260px));
justify-content:center;
gap:25px;
padding:30px;
max-width:1000px;
margin:auto;
}

/* CARD */

.card{
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.35s;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* IMAGE */

.card img{
width:100%;
height:120px;
object-fit:contain;
padding:12px;
display:block;
margin:auto;
}

/* CONTENT */

.card-content{
text-align:center;
padding:10px;
}

.price{
font-weight:bold;
margin-bottom:8px;
}

/* BUTTON */

.ar-btn{
display:inline-block;
background:#ff5722;
color:white;
padding:8px 16px;
border-radius:6px;
font-weight:bold;
font-size:14px;
}

/* VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
}

.viewer-box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
text-align:center;
}

model-viewer{
width:100%;
height:320px;
background:#eee;
border-radius:10px;
}

/* CLOSE */

.close-btn{
margin-top:15px;
padding:10px 18px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<img src="italian.PNG">

<h2>Italiano Cafe</h2>

<p>AR Smart Menu</p>

</header>

<div class="intro">

Tap any item → View it in Augmented Reality → Place it on your table

</div>

<!-- BURGER -->

<div class="category">Burgers</div>

<div class="menu">

<div class="card" onclick="openViewer('burger.glb')">

<img src="burger.png">

<div class="card-content">

<h3>Deluxe Burger</h3>
<p class="price">850 PKR</p>

<div class="ar-btn">View in AR</div>

</div>

</div>

</div>

<!-- PIZZA -->

<div class="category">Pizza</div>

<div class="menu">

<div class="card" onclick="openViewer('pizza.glb')">

<img src="pizza.png">

<div class="card-content">

<h3>Italian Pizza</h3>
<p class="price">1200 PKR</p>

<div class="ar-btn">View in AR</div>

</div>

</div>

</div>

<!-- DRINKS -->

<div class="category">Drinks</div>

<div class="menu">

<div class="card" onclick="openViewer('coffee.glb')">

<img src="coffee.png">

<div class="card-content">

<h3>Cappuccino Coffee</h3>
<p class="price">500 PKR</p>

<div class="ar-btn">View in AR</div>

</div>

</div>

</div>

<!-- DESSERT -->

<div class="category">Desserts</div>

<div class="menu">

<div class="card" onclick="openViewer('cake.glb')">

<img src="dessert.png">

<div class="card-content">

<h3>Chocolate Dessert</h3>
<p class="price">650 PKR</p>

<div class="ar-btn">View in AR</div>

</div>

</div>

</div>

<!-- AR VIEWER -->

<div class="viewer" id="viewer">

<div class="viewer-box">

<model-viewer
id="modelViewer"
src="burger.glb"
ar
camera-controls
auto-rotate
shadow-intensity="1"
ar-modes="scene-viewer webxr quick-look">
</model-viewer>

<button class="close-btn" onclick="closeViewer()">Close</button>

</div>

</div>

<script>

function openViewer(model){

document.getElementById("viewer").style.display="flex"
document.getElementById("modelViewer").src=model

}

function closeViewer(){

document.getElementById("viewer").style.display="none"

}

</script>

</body>

</html>
